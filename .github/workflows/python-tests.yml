# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.


name: Python CI

on:
  workflow_dispatch:
  pull_request:
  push:
    tags: [ 'v*' ]  # run again on release tags to have tools mark them
    branches: [ 'main', 'next' ]
  schedule:
    # schedule daily tests, since some dependencies are not intended to be pinned
    # this means: at 23:42 every day
    - cron: '42 23 * * *'

env:
  PYTHON_VERSION_DEFAULT: "3.14"

permissions:
  contents: read

jobs:
  static-code-analysis:
    name: StaticCodingAnalysis (py${{ matrix.python-version}} ${{ matrix.toxenv-factors }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.14'  # latest
            os: ubuntu-latest
          - python-version: '3.9'   # lowest
            os: ubuntu-latest
    steps:
      - name: Checkout
        # see https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python Environment
        # see https://github.com/actions/setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'x64'
      - name: Install project
        run: pip install --user -e ".[testing]"
      - name: Run Mypy
        run: python -m mypy -v
  build-and-test:
    name: Test (${{ matrix.os }} py${{ matrix.python-version }} ${{ matrix.toxenv-factors }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.14" # highest supported
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
          - "3.9" # lowest supported
        exclude:
          - os: macos-latest  # macos-latest is incompatible with some PY versions
            python-version: "3.10"
          - os: macos-latest  # macos-latest is incompatible with some PY versions
            python-version: "3.9"
    steps:
      - name: Disabled Git auto EOL CRLF transforms
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Checkout
        # see https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python Environment
        # see https://github.com/actions/setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'x64'
      - name: Validate Python Environment
        shell: python
        run: |
          import sys
          print('Python %s on %s in %s' % (sys.version, sys.platform, sys.getdefaultencoding()))
      - name: Install env dependencies
        run: python -m pip install --upgrade pip
      - name: Install project
        run: pip install --user -e ".[testing]"
      - name: Run Tests
        run: python -m pytest -m "not perf" tests
  perf-smoke:
    name: Performance Smoke (py${{ env.PYTHON_VERSION_DEFAULT }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python Environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          architecture: 'x64'
      - name: Install env dependencies
        run: python -m pip install --upgrade pip
      - name: Install project
        run: pip install --user -e ".[testing]"
      - name: Run perf smoke suite
        env:
          RFC3987_PERF_MODE: smoke
          RFC3987_PERF_RESULTS_JSON: perf-results/smoke-results.json
        run: |
          mkdir -p perf-results
          python -m pytest -m perf tests/test_perf.py -s
      - name: Upload perf smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-results
          path: perf-results/
  perf-full:
    name: Performance Full (py${{ env.PYTHON_VERSION_DEFAULT }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python Environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          architecture: 'x64'
      - name: Install env dependencies
        run: python -m pip install --upgrade pip
      - name: Install project
        run: pip install --user -e ".[testing]"
      - name: Run full perf suite
        env:
          RFC3987_PERF_MODE: full
          RFC3987_PERF_RESULTS_JSON: perf-results/full-results.json
        run: |
          mkdir -p perf-results
          python -m pytest -m perf tests/test_perf.py -s
      - name: Upload full perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-full-results
          path: perf-results/