name: Python Performance Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ 'main', 'next' ]
  schedule:
    # schedule daily tests, since some dependencies are not intended to be pinned
    # this means: at 23:42 every day
    - cron: '42 23 * * *'

env:
  PYTHON_VERSION_DEFAULT: "3.14"

permissions:
  contents: read

jobs:
  perf-smoke:
    name: Performance Smoke (py3.14)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # see https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python Environment
        # see https://github.com/actions/setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          architecture: 'x64'
      - name: Install env dependencies
        run: python -m pip install --upgrade pip
      - name: Install project
        run: pip install --user -e ".[testing]"
      - name: Run perf smoke suite
        env:
          RFC3987_PERF_MODE: smoke
          RFC3987_PERF_RESULTS_JSON: perf-results/smoke-results.json
        run: |
          mkdir -p perf-results
          python -m pytest -m perf tests/test_perf.py -s
      - name: Upload perf smoke results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: perf-smoke-results
          path: perf-results/
  perf-full:
    name: Performance Full (py3.14)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        # see https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python Environment
        # see https://github.com/actions/setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          architecture: 'x64'
      - name: Install env dependencies
        run: python -m pip install --upgrade pip
      - name: Install project
        run: pip install --user -e ".[testing]"
      - name: Run full perf suite
        env:
          RFC3987_PERF_MODE: full
          RFC3987_PERF_RESULTS_JSON: perf-results/full-results.json
        run: |
          mkdir -p perf-results
          python -m pytest -m perf tests/test_perf.py -s
      - name: Upload full perf results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: perf-full-results
          path: perf-results/
