# Deterministic parser performance baseline workflow.
name: Parser Performance Baseline

on:
  workflow_dispatch:
  schedule:
    # weekly baseline collection every Sunday at 01:15 UTC
    - cron: '15 1 * * 0'

env:
  PYTHON_VERSION_DEFAULT: "3.14"
  RFC3987_PERF_LOOPS: "3"
  RFC3987_PERF_WARMUP_LOOPS: "1"
  RFC3987_PERF_OUTPUT_JSON: "${{ github.workspace }}/artifacts/perf/perf-results.json"

permissions:
  contents: read

jobs:
  perf-benchmark:
    name: PerfBenchmark
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        # see https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Python Environment
        # see https://github.com/actions/setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          architecture: 'x64'
      - name: Install env dependencies
        run: python -m pip install --upgrade pip
      - name: Install project
        run: python -m pip install --user -e ".[testing]"
      - name: Run perf tests
        run: python -m pytest -m perf tests/test_perf.py -q
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4
        with:
          name: parser-perf-benchmark
          path: artifacts/perf
          if-no-files-found: error
